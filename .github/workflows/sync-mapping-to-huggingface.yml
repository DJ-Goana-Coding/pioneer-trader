name: Bridge to Hugging Face - Mapping and Inventory

on:
  workflow_dispatch:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/sync_mapping_to_huggingface.sh'

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pioneer-trader
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Clone mapping-and-inventory repository
        run: |
          cd /tmp
          git clone https://github.com/DJ-Goana-Coding/mapping-and-inventory.git
          cd mapping-and-inventory
          echo "Repository cloned successfully"
          ls -la

      - name: Prepare Hugging Face deployment files
        run: |
          cd /tmp/mapping-and-inventory

          # Create README with HF metadata
          cat > README_HF.md << 'EOF'
          ---
          title: Mapping and Inventory
          emoji: 🗺️
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          # 🗺️ Mapping and Inventory

          A comprehensive mapping and inventory system for the Citadel Omega ecosystem.

          ## 📚 Documentation

          This space contains extensive documentation and architectural guides for:

          - Citadel Omega Architecture
          - Agent Legion Systems
          - Omnidimensional Infrastructure
          - Character Discovery and Activation
          - Deployment Guides
          - And much more...

          ## 🚀 Deployment

          This space is deployed using Docker. See the Dockerfile for configuration details.

          ## 📖 Browse Documentation

          Navigate through the files to explore the complete documentation set.
          EOF

          # Backup original README and use HF version
          if [ -f README.md ]; then
            mv README.md README_ORIGINAL.md
          fi
          mv README_HF.md README.md

          # Create Dockerfile for Gradio documentation browser
          cat > Dockerfile << 'DOCKERFILE'
          FROM python:3.11-slim

          WORKDIR /app

          # Install dependencies
          RUN pip install --no-cache-dir gradio huggingface-hub

          # Copy all documentation
          COPY . .

          # Create Gradio app
          RUN cat > app.py << 'PYEOF'
          import gradio as gr
          import os
          from pathlib import Path

          def list_files():
              """List all markdown files in the repository"""
              md_files = sorted([str(p) for p in Path(".").rglob("*.md") if "README" not in str(p)])
              return md_files

          def read_file(filepath):
              """Read and return file contents"""
              if not filepath:
                  return "Please select a file from the dropdown."
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      content = f.read()
                      return content
              except Exception as e:
                  return f"Error reading file: {e}"

          def get_file_tree():
              """Generate a tree view of markdown files"""
              md_files = sorted([str(p) for p in Path(".").rglob("*.md")])
              tree = "# 📁 Documentation Structure\n\n"
              for f in md_files:
                  depth = len(Path(f).parts) - 1
                  indent = "  " * depth
                  name = Path(f).name
                  tree += f"{indent}- {name}\n"
              return tree

          # Create Gradio interface
          with gr.Blocks(title="Mapping and Inventory Documentation", theme=gr.themes.Soft()) as demo:
              gr.Markdown("# 🗺️ Mapping and Inventory - Documentation Browser")
              gr.Markdown("Browse through the comprehensive documentation of the Citadel Omega ecosystem.")

              with gr.Tabs():
                  with gr.Tab("📖 Browse Documents"):
                      with gr.Row():
                          with gr.Column(scale=1):
                              file_list = gr.Dropdown(
                                  choices=list_files(),
                                  label="Select Documentation File",
                                  interactive=True
                              )
                              gr.Markdown("### 💡 Quick Access")
                              gr.Markdown("""
                              - CITADEL_OMEGA_ARCHITECTURE.md
                              - AGENT_LEGION_COMPLETE_SUMMARY.md
                              - DEPLOYMENT_GUIDE.md
                              - MASTER_QUICKSTART.md
                              """)

                          with gr.Column(scale=3):
                              content_display = gr.Markdown(
                                  value="Please select a file from the dropdown to view its contents.",
                                  label="Content"
                              )

                      file_list.change(fn=read_file, inputs=file_list, outputs=content_display)

                  with gr.Tab("🌲 File Tree"):
                      tree_display = gr.Markdown(value=get_file_tree())

              gr.Markdown("---")
              gr.Markdown("🔗 [GitHub Repository](https://github.com/DJ-Goana-Coding/mapping-and-inventory)")

          if __name__ == "__main__":
              demo.launch(server_name="0.0.0.0", server_port=7860)
          PYEOF

          EXPOSE 7860

          CMD ["python", "app.py"]
          DOCKERFILE

          # Create requirements.txt
          cat > requirements.txt << 'EOF'
          gradio>=4.0.0
          huggingface-hub>=0.19.0
          EOF

          echo "✅ Hugging Face deployment files created"
          ls -la

      - name: Deploy to Hugging Face Space
        if: github.event_name != 'pull_request'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "⚠️ HF_TOKEN secret not set. Skipping deployment."
            echo "To enable deployment, add your Hugging Face token as HF_TOKEN secret in GitHub repository settings."
            exit 0
          fi

          cd /tmp/mapping-and-inventory

          # Install Hugging Face CLI
          pip install huggingface-hub[cli]

          # Login to Hugging Face
          huggingface-cli login --token "$HF_TOKEN"

          # Create or update the space
          huggingface-cli upload DJ-Goana-Coding/Mapping-and-Inventory . --repo-type=space --commit-message="Sync from mapping-and-inventory repository" || echo "Upload completed with warnings"

          echo "✅ Successfully deployed to Hugging Face Space: https://huggingface.co/spaces/DJ-Goana-Coding/Mapping-and-Inventory"

      - name: Summary
        run: |
          echo "## 🌉 Bridge Tunnel Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully created bridge between repositories" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Repositories Connected:" >> $GITHUB_STEP_SUMMARY
          echo "- Source: [DJ-Goana-Coding/mapping-and-inventory](https://github.com/DJ-Goana-Coding/mapping-and-inventory)" >> $GITHUB_STEP_SUMMARY
          echo "- Destination: [Hugging Face Space - Mapping-and-Inventory](https://huggingface.co/spaces/DJ-Goana-Coding/Mapping-and-Inventory)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Add your Hugging Face token as \`HF_TOKEN\` secret in repository settings" >> $GITHUB_STEP_SUMMARY
          echo "2. The workflow will automatically sync to Hugging Face on schedule or manual trigger" >> $GITHUB_STEP_SUMMARY
